<svg width="840" height="420" viewBox="0 0 840 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&amp;display=swap');
      text { font-family: 'Space Grotesk', sans-serif; }
    </style>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="840" height="420" fill="white" rx="16"/>

  <!-- Step 1 -->
  <g transform="translate(40, 60)">
    <rect width="160" height="100" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="20" cy="20" r="10" fill="#4B90D9"/>
    <text x="20" y="24" text-anchor="middle" font-size="10" font-weight="700" fill="white">1</text>
    <text x="80" y="50" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">AI CLIENT</text>
    <text x="80" y="70" text-anchor="middle" font-size="10" fill="#64748b">Wants to list</text>
    <text x="80" y="85" text-anchor="middle" font-size="10" fill="#64748b">GH Issues</text>
  </g>

  <path d="M200 110 L260 110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <!-- Step 2 -->
  <g transform="translate(260, 60)">
    <rect width="180" height="100" rx="12" fill="#5B3FD4" fill-opacity="0.1" stroke="#5B3FD4" stroke-width="2"/>
    <circle cx="20" cy="20" r="10" fill="#5B3FD4"/>
    <text x="20" y="24" text-anchor="middle" font-size="10" font-weight="700" fill="white">2</text>
    <text x="90" y="45" text-anchor="middle" font-size="12" font-weight="700" fill="#5B3FD4">MCP SERVER</text>
    <text x="90" y="65" text-anchor="middle" font-size="10" fill="#334155">Translates request</text>
    <text x="90" y="80" text-anchor="middle" font-size="10" fill="#334155">to GH API call</text>
  </g>

  <path d="M440 110 L500 110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <!-- Step 3 -->
  <g transform="translate(500, 60)">
    <rect width="160" height="100" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="20" cy="20" r="10" fill="#64748b"/>
    <text x="20" y="24" text-anchor="middle" font-size="10" font-weight="700" fill="white">3</text>
    <text x="80" y="50" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">GITHUB API</text>
    <text x="80" y="70" text-anchor="middle" font-size="10" fill="#64748b">Returns JSON</text>
    <text x="80" y="85" text-anchor="middle" font-size="10" fill="#64748b">Issues Data</text>
  </g>

  <!-- Response Path -->
  <path d="M580 160 Q 580 240 350 240" stroke="#00a943" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow-gray)"/>
  
  <!-- Step 4 -->
  <g transform="translate(140, 200)">
    <rect width="210" height="80" rx="12" fill="#f0fdf4" stroke="#00a943" stroke-width="2"/>
    <circle cx="20" cy="20" r="10" fill="#00a943"/>
    <text x="20" y="24" text-anchor="middle" font-size="10" font-weight="700" fill="white">4</text>
    <text x="105" y="45" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">CONTEXT INGESTED</text>
    <text x="105" y="65" text-anchor="middle" font-size="10" fill="#15803d">AI now "knows" what is in GitHub</text>
  </g>

  <text x="420" y="360" text-anchor="middle" font-size="14" font-weight="400" fill="#9ca3af">The Protocol Lifecycle</text>
</svg>
