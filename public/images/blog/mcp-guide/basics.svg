<svg width="840" height="420" viewBox="0 0 840 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&amp;display=swap');
      text { font-family: 'Space Grotesk', sans-serif; }
    </style>
    <filter id="box-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="840" height="420" fill="white" rx="16"/>

  <!-- AI Tools Group -->
  <g transform="translate(40, 60)">
    <rect width="220" height="300" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="110" y="-15" text-anchor="middle" font-size="14" font-weight="700" fill="#64748b" letter-spacing="0.05em">AI CLIENTS</text>
    
    <g transform="translate(20, 40)" filter="url(#box-shadow)">
      <rect width="180" height="60" rx="12" fill="#4A90D9"/>
      <text x="90" y="36" text-anchor="middle" fill="white" font-size="14" font-weight="700">Claude</text>
    </g>
    
    <g transform="translate(20, 120)" filter="url(#box-shadow)">
      <rect width="180" height="60" rx="12" fill="#7B61FF"/>
      <text x="90" y="36" text-anchor="middle" fill="white" font-size="14" font-weight="700">Antigravity IDE</text>
    </g>
    
    <g transform="translate(20, 200)" filter="url(#box-shadow)">
      <rect width="180" height="60" rx="12" fill="#2DD4BF"/>
      <text x="90" y="36" text-anchor="middle" fill="white" font-size="14" font-weight="700">Cursor</text>
    </g>
  </g>

  <!-- MCP Center -->
  <g transform="translate(300, 180)">
    <rect x="0" y="-45" width="240" height="90" rx="16" fill="#5B3FD4" filter="url(#box-shadow)"/>
    <text x="120" y="-60" text-anchor="middle" font-size="12" font-weight="700" fill="#5B3FD4" letter-spacing="0.1em">UNIVERSAL STANDARD</text>
    <text x="120" y="5" text-anchor="middle" fill="white" font-size="18" font-weight="700">MCP SERVER</text>
  </g>

  <!-- Services Group -->
  <g transform="translate(580, 60)">
    <rect width="220" height="300" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="110" y="-15" text-anchor="middle" font-size="14" font-weight="700" fill="#64748b" letter-spacing="0.05em">DATA SOURCES</text>
    
    <g transform="translate(20, 40)" filter="url(#box-shadow)">
      <rect width="180" height="50" rx="25" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="90" y="31" text-anchor="middle" fill="#334155" font-size="12" font-weight="600">GitHub</text>
    </g>
    
    <g transform="translate(20, 105)" filter="url(#box-shadow)">
      <rect width="180" height="50" rx="25" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="90" y="31" text-anchor="middle" fill="#334155" font-size="12" font-weight="600">Notion</text>
    </g>
    
    <g transform="translate(20, 170)" filter="url(#box-shadow)">
      <rect width="180" height="50" rx="25" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="90" y="31" text-anchor="middle" fill="#334155" font-size="12" font-weight="600">Google Calendar</text>
    </g>
    
    <g transform="translate(20, 235)" filter="url(#box-shadow)">
      <rect width="180" height="50" rx="25" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="90" y="31" text-anchor="middle" fill="#334155" font-size="12" font-weight="600">Slack</text>
    </g>
  </g>

  <!-- Connections -->
  <!-- Left Side Arrows -->
  <path d="M260 100 Q 300 100 300 150" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="4 4"/>
  <path d="M260 180 L 300 180" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="4 4"/>
  <path d="M260 260 Q 300 260 300 210" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="4 4"/>
  
  <!-- Right Side Arrows -->
  <path d="M540 180 Q 580 180 580 100" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="4 4"/>
  <path d="M540 180 Q 580 180 580 165" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="4 4"/>
  <path d="M540 180 Q 580 180 580 230" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="4 4"/>
  <path d="M540 180 Q 580 180 580 295" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="4 4"/>

</svg>