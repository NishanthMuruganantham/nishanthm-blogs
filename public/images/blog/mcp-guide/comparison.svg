<svg width="840" height="420" viewBox="0 0 840 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&amp;display=swap');
      text { font-family: 'Space Grotesk', sans-serif; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="840" height="420" fill="white" rx="16"/>

  <!-- Left Side: Traditional -->
  <g transform="translate(60, 60)">
    <rect width="320" height="300" rx="16" fill="#fef2f2" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="160" y="-15" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444" letter-spacing="0.1em">TRADITIONAL (BLOCKED)</text>
    
    <!-- AI -->
    <rect x="85" y="40" width="150" height="60" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="160" y="76" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">AI Tool</text>

    <!-- Block -->
    <rect x="110" y="130" width="100" height="40" rx="20" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="160" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">Copy-Paste</text>
    
    <!-- Tools -->
    <rect x="85" y="200" width="150" height="60" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="160" y="236" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">Services</text>

    <path d="M160 100 L160 130" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M160 170 L160 200" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- Right Side: Agentic -->
  <g transform="translate(460, 60)">
    <rect width="320" height="300" rx="16" fill="#f0fdf4" stroke="#00a943" stroke-width="2"/>
    <text x="160" y="-15" text-anchor="middle" font-size="14" font-weight="700" fill="#00a943" letter-spacing="0.1em">AGENTIC (MCP)</text>
    
    <!-- AI -->
    <rect x="85" y="40" width="150" height="60" rx="12" fill="#4A90D9"/>
    <text x="160" y="76" text-anchor="middle" font-size="14" font-weight="700" fill="white">AI Agent</text>

    <!-- MCP -->
    <rect x="110" y="130" width="100" height="40" rx="8" fill="#5B3FD4"/>
    <text x="160" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="white">MCP</text>
    
    <!-- Tools -->
    <rect x="85" y="200" width="150" height="60" rx="12" fill="#7B61FF"/>
    <text x="160" y="236" text-anchor="middle" font-size="14" font-weight="700" fill="white">Tools</text>

    <path d="M160 100 L160 130" stroke="#00a943" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M160 170 L160 200" stroke="#00a943" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <text x="420" y="395" text-anchor="middle" font-size="12" font-weight="400" fill="#9ca3af">Manual Clipboard Courier vs Seamless Protocol Bridge</text>
</svg>
