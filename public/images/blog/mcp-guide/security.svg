<svg width="840" height="360" viewBox="0 0 840 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&amp;display=swap');
      text { font-family: 'Space Grotesk', sans-serif; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="840" height="360" fill="white" rx="16"/>

  <!-- Local Machine (Trust Zone) -->
  <g transform="translate(40, 60)">
    <rect width="440" height="240" rx="20" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" stroke-dasharray="8 6"/>
    <text x="220" y="-15" text-anchor="middle" font-size="14" font-weight="700" fill="#166534" letter-spacing="0.1em">LOCAL MACHINE (TRUST ZONE)</text>

    <!-- Token Storage -->
    <g transform="translate(40, 60)" filter="url(#shadow)">
      <rect width="100" height="100" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="50" y="45" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">SECURE</text>
      <text x="50" y="65" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">TOKEN</text>
      <text x="50" y="85" text-anchor="middle" font-size="10" fill="#64748b">STORAGE</text>
    </g>

    <!-- MCP Server -->
    <g transform="translate(170, 60)" filter="url(#shadow)">
      <rect width="100" height="100" rx="12" fill="#5B3FD4"/>
      <text x="50" y="45" text-anchor="middle" font-size="13" font-weight="700" fill="white">MCP</text>
      <text x="50" y="65" text-anchor="middle" font-size="13" font-weight="700" fill="white">SERVER</text>
      <text x="50" y="85" text-anchor="middle" font-size="9" fill="#dbeafe">Local Binary</text>
    </g>

    <!-- AI Agent -->
    <g transform="translate(300, 60)" filter="url(#shadow)">
      <rect width="100" height="100" rx="12" fill="#4B90D9"/>
      <text x="50" y="45" text-anchor="middle" font-size="13" font-weight="700" fill="white">AI AGENT</text>
      <text x="50" y="65" text-anchor="middle" font-size="10" fill="#dbeafe">(Claude/IDE)</text>
    </g>
  </g>

  <!-- External Services -->
  <g transform="translate(560, 60)">
    <rect width="240" height="240" rx="20" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="120" y="-15" text-anchor="middle" font-size="14" font-weight="700" fill="#64748b" letter-spacing="0.1em">EXTERNAL SERVICES</text>
    
    <g transform="translate(40, 60)" opacity="0.4">
      <rect width="160" height="40" rx="20" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
      <text x="80" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">GITHUB / NOTION</text>
    </g>
    
    <g transform="translate(40, 140)" opacity="0.4">
      <rect width="160" height="40" rx="20" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
      <text x="80" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">SLACK / LINEAR</text>
    </g>
  </g>

  <!-- Secure Bridge -->
  <path d="M480 180 L560 180" stroke="#16a34a" stroke-width="3" stroke-dasharray="4 4"/>
  <text x="520" y="165" text-anchor="middle" font-size="10" font-weight="700" fill="#16a34a">SECURE DATA</text>

  <!-- Bottom Message -->
  <text x="420" y="340" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">TOKENS AND RAW DATA NEVER LEAVE YOUR MACHINE</text>
</svg>
